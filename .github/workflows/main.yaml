name: Lint, Build

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.19
      - name: Checkout
        uses: actions/checkout@v3
      - name: Format
        run: |
          if [ "$(gofmt -d -e . | wc -l)" -gt 0 ]; then
            gofmt -d -e .
            exit 1
          fi
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Build Container Image
        run: |
          docker build -t sudomateo/todo:latest .
